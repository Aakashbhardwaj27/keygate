version: "3.9"

services:
  # ── PostgreSQL ──────────────────────────────────────────
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: keygate
      POSTGRES_USER: keygate
      POSTGRES_PASSWORD: ${DB_PASSWORD:-keygate_dev_password}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U keygate"]
      interval: 5s
      timeout: 3s
      retries: 5

  # ── Backend (FastAPI) ───────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      DATABASE_URL: postgresql+asyncpg://keygate:${DB_PASSWORD:-keygate_dev_password}@db:5432/keygate
      SECRET_KEY: ${SECRET_KEY:-change-me-in-production}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@keygate.dev}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-changeme}
      CORS_ORIGINS: '["http://localhost:3000"]'
      # Vendor keys (set in .env)
      OPENAI_ADMIN_KEY: ${OPENAI_ADMIN_KEY:-}
      ANTHROPIC_ADMIN_KEY: ${ANTHROPIC_ADMIN_KEY:-}
      AZURE_SUBSCRIPTION_ID: ${AZURE_SUBSCRIPTION_ID:-}
      AZURE_RESOURCE_GROUP: ${AZURE_RESOURCE_GROUP:-}
      GCP_PROJECT_ID: ${GCP_PROJECT_ID:-}
      GCP_REGION: ${GCP_REGION:-us-central1}
    ports:
      - "8000:8000"
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 5

  # ── Frontend (React + Nginx) ────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    depends_on:
      backend:
        condition: service_healthy
    ports:
      - "3000:3000"

volumes:
  pgdata:

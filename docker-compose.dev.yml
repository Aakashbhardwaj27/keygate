version: "3.9"

# Development overrides — run with:
#   docker compose -f docker-compose.yml -f docker-compose.dev.yml up

services:
  backend:
    build:
      context: ./backend
    command: uvicorn app.main:app --reload --host 0.0.0.0 --port 8000
    volumes:
      - ./backend:/app
    environment:
      DEBUG: "true"
      DATABASE_URL: postgresql+asyncpg://keygate:keygate_dev_password@db:5432/keygate

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    # Override to use Vite dev server instead of Nginx
    command: sh -c "npm install && npm run dev -- --host 0.0.0.0 --port 3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
    environment:
      VITE_API_URL: http://localhost:8000
